version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: dispatcher_db
    environment:
      POSTGRES_USER: dispatcher_admin
      POSTGRES_PASSWORD: password123 # Hardcoded for local dev only
      POSTGRES_DB: dispatcher_v1
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  db_backup:
    image: prodrigestivill/postgres-backup-local
    container_name: dispatcher_db_backup
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: dispatcher_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: dispatcher_v1
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
    volumes:
      - ./backups:/backups
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dispatcher_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/dispatcher_v1
      - SPRING_DATASOURCE_USERNAME=dispatcher_admin
      - SPRING_DATASOURCE_PASSWORD=password123
    volumes:
      - ./backend:/app
      - ~/.m2:/root/.m2
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dispatcher_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pgdata:
